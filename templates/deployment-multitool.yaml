apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-multitool
spec:
  replicas: {{ .Values.multitool.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-multitool
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-multitool
    spec:
      containers:
      - name: multitool
        image: "{{ .Values.multitool.image.repository }}:{{ .Values.multitool.image.tag }}"
        env:
        - name: HTTP_PORT
          value: "8080"
        ports:
        - containerPort: 8080
